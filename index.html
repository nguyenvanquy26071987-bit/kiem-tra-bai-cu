<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Gọi Tên - Thầy Nguyễn Văn Quý</title>
    <style>
        body { 
            display: flex; 
            flex-direction: column;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f4f7f6; 
            margin: 0; 
            height: 100vh; 
        }
        
        /* Tiêu đề phía trên */
        .header {
            background-color: #2c3e50;
            color: #f1c40f;
            text-align: center;
            padding: 15px;
            font-size: 26px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 20;
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Cột bên trái: Nhập danh sách */
        .left-panel { 
            width: 30%; 
            padding: 20px; 
            background: #ffffff; 
            border-right: 3px solid #e0e0e0; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            z-index: 10;
        }
        .left-panel h2 { color: #2980b9; margin-top: 0; font-size: 22px; }
        .left-panel p { color: #555; margin-bottom: 10px; font-size: 15px; }
        textarea { 
            flex-grow: 1; 
            font-size: 16px; 
            padding: 15px; 
            line-height: 1.8;
            resize: none; 
            border-radius: 8px; 
            border: 2px solid #bdc3c7; 
            outline: none;
            transition: 0.3s;
            white-space: pre-wrap;
        }
        textarea:focus { border-color: #3498db; }

        /* Cột bên phải: Vòng quay */
        .right-panel { 
            width: 70%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            position: relative;
        }
        
        /* Khu vực hiển thị vòng quay */
        .wheel-wrapper {
            position: relative;
            width: 420px;
            height: 420px;
        }

        /* Mũi tên chỉ */
        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; 
            height: 0; 
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-top: 50px solid #e74c3c;
            z-index: 10;
            filter: drop-shadow(0px 4px 2px rgba(0,0,0,0.3));
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 10px solid #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            /* Sẽ được điều khiển xoay bằng JavaScript */
        }

        /* Bảng điều khiển */
        .controls {
            margin-top: 30px;
            text-align: center;
        }

        .timer { 
            font-size: 2em; 
            color: #d35400; 
            margin-bottom: 20px; 
            font-weight: bold; 
            background: rgba(255,255,255,0.9);
            padding: 10px 30px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn { 
            padding: 18px 50px; 
            font-size: 1.5em; 
            border: none; 
            border-radius: 50px; 
            background: #e74c3c; 
            color: white; 
            cursor: pointer; 
            transition: 0.3s; 
            font-weight: bold; 
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
            text-transform: uppercase;
        }
        .btn:hover { background: #c0392b; transform: translateY(-2px); }
        .btn:disabled { background: #95a5a6; cursor: not-allowed; box-shadow: none; transform: translateY(0); }

        /* Khung hiển thị kết quả */
        .congrats { 
            display: none; 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.2em; 
            color: #1e8449; 
            font-weight: bold; 
            text-align: center; 
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 4px dashed #27ae60;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 100;
            width: 80%;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
        }

        @keyframes popIn { 
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 
        }
    </style>
</head>
<body>

    <div class="header">
        KIỂM TRA BÀI CŨ - PHÁT TRIỂN BỞI THẦY GIÁO NGUYỄN VĂN QUÝ
    </div>

    <div class="main-content">
        <div class="left-panel">
            <h2>Danh sách lớp</h2>
            <p>Mỗi học sinh một dòng. Hệ thống sẽ tự động vẽ lại vòng quay khi thầy sửa tên.</p>
            <textarea id="studentList" oninput="updateWheel()">
Nguyễn Văn A
Trần Thị B
Lê Hoàng C
Phạm Văn D
Hoàng Thị E
Ngô Văn F
            </textarea>
        </div>

        <div class="right-panel">
            <div class="wheel-wrapper">
                <div class="pointer"></div>
                <canvas id="wheel" width="500" height="500"></canvas>
            </div>
            
            <div class="controls">
                <div class="timer" id="timerDisplay">Thời gian: 10s</div>
                <button class="btn" id="spinBtn" onclick="spinWheel()">QUAY TÊN</button>
            </div>
            
            <div class="congrats" id="congratsMsg">
                🎉 Chúc mừng em:<br>
                <span id="winnerName" style="font-size: 1.5em; color: #c0392b; display: inline-block; margin: 15px 0;"></span><br>
                lên bảng kiểm tra bài cũ! 🎉<br>
                <button style="margin-top:20px; padding:10px 20px; font-size:20px; background:#3498db; color:white; border:none; border-radius:10px; cursor:pointer;" onclick="closeCongrats()">Đóng</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const colors = ["#1abc9c", "#3498db", "#9b59b6", "#f1c40f", "#e67e22", "#e74c3c", "#2ecc71", "#34495e", "#d35400", "#c0392b"];
        let students = [];
        let currentRotation = 0; // Góc xoay hiện tại của Canvas

        // Hàm đọc danh sách và vẽ vòng quay
        function updateWheel() {
            const listText = document.getElementById('studentList').value;
            // Lọc danh sách, bỏ các dòng trống
            students = listText.split('\n').map(s => s.trim()).filter(s => s !== '');
            
            // Xóa canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Nếu không có học sinh nào, không vẽ
            if (students.length === 0) return;

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = canvas.width / 2;
            const arcDeg = 360 / students.length;
            const arcRad = (2 * Math.PI) / students.length;

            for (let i = 0; i < students.length; i++) {
                const startAngle = i * arcRad;
                const endAngle = startAngle + arcRad;

                // Vẽ cung màu
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = "#ffffff";
                ctx.stroke();

                // Vẽ chữ
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + arcRad / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 20px 'Segoe UI', Tahoma, sans-serif";
                ctx.shadowColor = "rgba(0,0,0,0.6)";
                ctx.shadowBlur = 4;
                
                // Cắt ngắn tên nếu quá dài để không bị tràn
                let displayName = students[i];
                if (displayName.length > 20) {
                    displayName = displayName.substring(0, 18) + '...';
                }
                
                ctx.fillText(displayName, radius - 20, 7); // 7 là độ lệch y để chữ cân giữa
                ctx.restore();
            }

            // Xóa hiệu ứng xoay (nếu có) để đặt lại vị trí
            canvas.style.transition = 'none';
            canvas.style.transform = `rotate(${currentRotation}deg)`;
        }

        function spinWheel() {
            if (students.length === 0) {
                alert("Thầy vui lòng nhập danh sách học sinh vào ô bên trái nhé!");
                return;
            }

            const btn = document.getElementById('spinBtn');
            const textArea = document.getElementById('studentList');
            const timerDisplay = document.getElementById('timerDisplay');
            
            // Khóa các nút và ô nhập liệu trong lúc quay
            btn.disabled = true;
            textArea.disabled = true;

            // 1. Chọn ngẫu nhiên 1 học sinh trúng thưởng
            const winnerIndex = Math.floor(Math.random() * students.length);
            const arcDeg = 360 / students.length;

            // 2. Tính toán góc quay để học sinh đó nằm ngay dưới mũi tên (mũi tên nằm ở góc 270 độ / hướng 12h)
            // Góc xoay thêm = 10 vòng (3600 độ) + (270 độ trừ đi vị trí giữa của cung chứa tên học sinh)
            const spins = 10 * 360; 
            const targetOffset = 270 - (winnerIndex * arcDeg + arcDeg / 2);
            
            // Đảm bảo vòng quay nối tiếp mượt mà từ góc hiện tại
            const remainder = currentRotation % 360;
            currentRotation = currentRotation - remainder + spins + targetOffset;

            // 3. Thực hiện hiệu ứng quay bằng CSS (chính xác 10 giây)
            canvas.style.transition = 'transform 10s cubic-bezier(0.1, 0.8, 0.1, 1)';
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            // 4. Đồng hồ đếm ngược 10 giây
            let timeLeft = 10;
            timerDisplay.innerText = `Thời gian: ${timeLeft}s`;
            
            const countdownInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = `Thời gian: ${timeLeft}s`;
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                }
            }, 1000);

            // 5. Sau khi quay xong (đúng 10000ms = 10s), hiển thị thông báo
            setTimeout(() => {
                document.getElementById('winnerName').innerText = students[winnerIndex];
                document.getElementById('congratsMsg').style.display = 'block';
                
                // Mở khóa nút bấm để quay tiếp
                btn.disabled = false;
                btn.innerText = "QUAY LẠI LẦN NỮA";
                textArea.disabled = false;
            }, 10000);
        }

        // Đóng bảng thông báo chúc mừng
        function closeCongrats() {
            document.getElementById('congratsMsg').style.display = 'none';
        }

        // Vẽ vòng quay ngay khi vừa load trang
        window.onload = updateWheel;
    </script>
</body>
</html>
